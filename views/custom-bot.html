<head>
  <title>Buy Bot - Liban Alasow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="https://s.libanalasow.repl.co/icon.png">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
	<script src="https://kit.fontawesome.com/fd1595971c.js" crossorigin="anonymous"></script>
  <script src= "/socket.io/socket.io.js"></script>
</head>

<body>
  <h1 style="color: white; font-weight: bold; text-align: center; margin: 50px;">Buy Custom Bot</h1>

  <form class="container" id="form">
    <p style="margin: 10px;">Your Information</p>
    <input type="text" class="fullname normal-input" placeholder="Full name" required>
    <input type="email" class="email normal-input" placeholder="Email" required>
    <p style="margin: 10px;">Your Bot</p>
    <textarea placeholder="Describe how you want it to work, the commands" form="form" class="desc" required></textarea>
    <p style="margin: 10px;">Are you a robot?</p>
    <div class="check">
      <div><input type="checkbox" class="imnotarobot" required>
      Im not a Robot</div>
      <p style="color: lightgrey; font-size: 10px; margin: 3px; padding: 0px 10px 0px 0px;">Powered by ReLiban</p>
    </div>
    <div class="bottom">
      <input type="submit" value="Send" class="submit">
      <p>Thank you!</p>
    </div>
  </form>
</body>


<style>


body {
  background: #ff2e2e;
}

.check {
  margin: 10px;
  background: none;
  border: solid 1px #ffe6e6;
  border-radius: 6px;
  width: 250px;
  height: 50px;
  padding: 10px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.container {
  margin: 20px auto;
  margin-bottom: 0;
  width: 550px;
  height: 650px;
  background: white;
  box-shadow: 0 2px 8px darkred;
  box-sizing: border-box;
  padding: 15px;
  overflow: scroll;
}

.normal-input {
  width: 80%;
  padding: 10px;
  margin: 10px;
  outline: none;
  border: 1px #ffe6e6 solid;
}

* {
  font-family: "Poppins", sans-serif;
}

.desc {
  resize: none;
  width: 80%;
  height: 200px;
  padding: 10px;
  margin: 10px;
  outline: none;
  border: 1px #ffe6e6 solid;
}

.submit {
  margin: 10px;
  width: 100px;
  height: 35px;
  outline: none;
  background: red;
  border: none;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.5s;
}
.submit:hover {
  box-shadow: 0 0 5px red;
}

.container .bottom {
  width: calc(100% - 20px);
  height: 50px;
  display: flex;
  justify-content: space-between;
  align-items: 10px;
  margin-top: 40px;
}



@media screen and (max-width: 650px) {
  .container {
    width: 100%;
    height: 100%;
    margin: 0;
  }
  h1 {
    display: none;
  }
  .submit {
    width: 100%;
    margin-left: auto;
    margin-right: auto;
  }
  .container .bottom p {
    display: none;
    
  }
  .normal-input {
    width: 100%;
    margin-left: auto;
    margin-right: auto;
  }
  .desc {
    width: 90%;
    margin-right: 0;
  }
  p {
    text-align: center;
  }
}





</style>



<script>

var tick = document.querySelector(".imnotarobot")
tick.disabled = true;

var rand = Math.round(Math.random()* 10000)
setTimeout(() => {
  tick.disabled = false;
}, 5000+rand)

var socket = io()


var form = document.querySelector("#form")
form.addEventListener("submit", (e) => {
  e.preventDefault();
  var fullname = document.querySelector(".fullname")
  var email = document.querySelector(".email")
  var desc = document.querySelector(".desc")
  socket.emit("buy-custom-bot", fullname.value, email.value, desc.value)
  window.location.reload()
  
})


</script>
